<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: dark navy rounded square -->
  <rect width="512" height="512" rx="96" fill="#0d1420"/>
  <!-- Rugby ball, rotated -30° -->
  <g transform="rotate(-30 256 256)">
    <!-- Ball body -->
    <path d="M 106,256 C 106,145 406,145 406,256 C 406,367 106,367 106,256 Z" fill="#f06000"/>
    <!-- Top adjacent face: thin dark strip near ball edge -->
    <path d="M 106,256 C 106,162 406,162 406,256 C 406,145 106,145 106,256 Z" fill="#000" opacity="0.28"/>
    <!-- Bottom adjacent face -->
    <path d="M 106,256 C 106,350 406,350 406,256 C 406,367 106,367 106,256 Z" fill="#000" opacity="0.28"/>
    <!-- Subtle specular highlight on front face -->
    <ellipse cx="215" cy="218" rx="55" ry="22" fill="white" opacity="0.09" transform="rotate(18 215 218)"/>
    <!-- Upper seam: dark, thin, dashed -->
    <path d="M 106,256 C 106,162 406,162 406,256" fill="none" stroke="#1c0900" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="10 5"/>
    <!-- Lower seam: dark, thin, dashed -->
    <path d="M 106,256 C 106,350 406,350 406,256" fill="none" stroke="#1c0900" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="10 5"/>
    <!-- Ball outline -->
    <path d="M 106,256 C 106,145 406,145 406,256 C 406,367 106,367 106,256 Z" fill="none" stroke="#7a2800" stroke-width="6"/>
  </g>
</svg>
